name: atlas
description: "Your Pocket AI Chatbot"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  
  window_manager: ^0.5.2
  screen_retriever: ^0.2.2
  tray_manager: ^0.5.3
  http: ^1.6.0
  provider: ^6.1.5+1
  flutter_markdown: ^0.7.3
  flutter_acrylic: ^1.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sprites/atlas.ico
    - assets/sprites/atlas.png

  fonts:
    - family: GoogleSans
      fonts:
        - asset: assets/fonts/GoogleSans-Regular.ttf
        - asset: assets/fonts/GoogleSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/GoogleSans-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf